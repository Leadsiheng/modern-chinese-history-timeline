<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>中国近现代史纲要 · 编年卷轴</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&display=swap');

* { margin:0; padding:0; box-sizing:border-box; }

:root {
  --paper: #f7f2e6;
  --paper-dark: #e8dfc8;
  --ink: #2c2416;
  --ink-light: #5c4a2a;
  --vermilion: #c41e3a;
  --vermilion-light: #f8d7da;
  --vermilion-glow: rgba(196,30,58,0.3);
  --indigo: #1a5276;
  --indigo-light: #d4e6f1;
  --indigo-glow: rgba(26,82,118,0.3);
  --wood: #5c3d2e;
  --wood-dark: #3e2213;
  --gold: #b8860b;
  --scroll-bg: linear-gradient(180deg, #f7f2e6 0%, #efe5cc 50%, #f7f2e6 100%);
}

html, body {
  background: #3e2213;
  font-family: 'Noto Serif SC', 'STSong', 'SimSun', serif;
  height: 100vh;
  overflow: hidden;
  user-select: none;
}

.scroll-stage {
  position: relative;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
}

/* 顶底卷轴杆 */
.scroll-rod {
  position: fixed;
  left: 0; right: 0;
  height: 22px;
  z-index: 100;
  background: linear-gradient(180deg, #4a2810 0%, #6b3a1f 30%, #8b4a2f 50%, #6b3a1f 70%, #4a2810 100%);
  box-shadow: 0 2px 12px rgba(0,0,0,0.5), inset 0 1px 3px rgba(255,255,255,0.1);
}
.scroll-rod.top { top:0; border-bottom: 3px solid #2a1505; }
.scroll-rod.bottom { bottom:0; border-top: 3px solid #2a1505; }

.scroll-rod::after {
  content: '';
  position: absolute;
  left: 50%; top: 50%;
  transform: translate(-50%, -50%);
  width: 60px; height: 8px;
  background: linear-gradient(180deg, #c9a84c, #8b6914, #c9a84c);
  border-radius: 4px;
  box-shadow: 0 0 8px rgba(201,168,76,0.4);
}

.paper-surface {
  position: fixed;
  top: 22px; bottom: 22px; left: 0; right: 0;
  background: var(--paper);
  background-image:
    radial-gradient(ellipse at 20% 50%, rgba(139,105,20,0.04) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 50%, rgba(139,105,20,0.04) 0%, transparent 50%),
    repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(139,105,20,0.02) 3px, rgba(139,105,20,0.02) 4px);
  overflow: hidden;
}

/* 顶部导航条 */
.top-nav {
  position: fixed;
  top: 22px; left: 0; right: 0;
  height: 56px;
  z-index: 90;
  background: linear-gradient(180deg, rgba(247,242,230,0.98) 0%, rgba(247,242,230,0.9) 80%, rgba(247,242,230,0) 100%);
  display: flex;
  align-items: center;
  padding: 0 40px;
  gap: 16px;
}

.top-nav .title {
  font-size: 22px;
  font-weight: 900;
  color: var(--ink);
  letter-spacing: 4px;
  white-space: nowrap;
  margin-right: 20px;
  text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
}

.chapter-tabs {
  display: flex;
  gap: 4px;
  flex: 1;
  overflow-x: auto;
  scrollbar-width: none;
}
.chapter-tabs::-webkit-scrollbar { display:none; }

.chapter-tab {
  flex-shrink: 0;
  padding: 6px 14px;
  font-size: 13px;
  font-family: 'Noto Serif SC', serif;
  font-weight: 600;
  border: 1.5px solid rgba(92,74,42,0.25);
  background: rgba(247,242,230,0.6);
  color: var(--ink-light);
  cursor: pointer;
  border-radius: 4px;
  transition: all 0.3s ease;
  white-space: nowrap;
  letter-spacing: 1px;
}
.chapter-tab:hover {
  background: rgba(196,30,58,0.08);
  border-color: var(--vermilion);
  color: var(--vermilion);
}
.chapter-tab.active {
  background: var(--vermilion);
  color: #fff;
  border-color: var(--vermilion);
  box-shadow: 0 2px 8px var(--vermilion-glow);
}

.filter-section {
  display: flex;
  gap: 8px;
  margin-left: auto;
}

.filter-btn {
  padding: 7px 16px;
  font-size: 13px;
  font-family: 'Noto Serif SC', serif;
  font-weight: 600;
  border: 1.5px solid rgba(92,74,42,0.3);
  background: rgba(247,242,230,0.8);
  color: var(--ink-light);
  cursor: pointer;
  border-radius: 4px;
  transition: all 0.3s ease;
  white-space: nowrap;
}
.filter-btn:hover { border-color: var(--ink-light); }
.filter-btn.active[data-filter="all"] {
  background: var(--ink);
  color: var(--paper);
  border-color: var(--ink);
}
.filter-btn.active[data-filter="memory"] {
  background: var(--vermilion);
  color: #fff;
  border-color: var(--vermilion);
  box-shadow: 0 2px 8px var(--vermilion-glow);
}
.filter-btn.active[data-filter="understand"] {
  background: var(--indigo);
  color: #fff;
  border-color: var(--indigo);
  box-shadow: 0 2px 8px var(--indigo-glow);
}

/* 主滚动区 */
.timeline-viewport {
  position: absolute;
  top: 78px; bottom: 0; left: 0; right: 0;
  overflow-x: auto;
  overflow-y: hidden;
  scroll-behavior: smooth;
  cursor: grab;
  scrollbar-width: thin;
  scrollbar-color: rgba(92,58,30,0.3) transparent;
}
.timeline-viewport:active { cursor: grabbing; }
.timeline-viewport::-webkit-scrollbar {
  height: 8px;
}
.timeline-viewport::-webkit-scrollbar-track {
  background: transparent;
}
.timeline-viewport::-webkit-scrollbar-thumb {
  background: rgba(92,58,30,0.3);
  border-radius: 4px;
}

.timeline-track {
  position: relative;
  height: 100%;
  min-width: 100%;
}

/* 时间轴刻度 */
.tick-mark {
  position: absolute;
  top: 50%;
  transform: translateX(-50%);
  pointer-events: none;
  z-index: 2;
  transition: left 0.3s ease-out;
}
.tick-mark .tick-line {
  width: 1px;
  background: rgba(44,36,22,0.3);
  margin: 0 auto;
}
.tick-mark.major .tick-line { height: 24px; background: rgba(44,36,22,0.45); width: 2px; }
.tick-mark.minor .tick-line { height: 12px; }
.tick-mark .tick-label {
  position: absolute;
  top: 16px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 11px;
  font-weight: 600;
  color: rgba(44,36,22,0.55);
  font-family: 'Noto Serif SC', serif;
  letter-spacing: 1px;
  white-space: nowrap;
}

/* 缩放控制 */
.zoom-controls {
  position: fixed;
  right: 24px;
  bottom: 42px;
  z-index: 60;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  background: rgba(247,242,230,0.92);
  padding: 6px;
  border-radius: 24px;
  border: 1px solid rgba(92,74,42,0.2);
  box-shadow: 0 2px 12px rgba(0,0,0,0.1);
}
.zoom-btn {
  width: 32px; height: 32px;
  border-radius: 50%;
  border: 1.5px solid rgba(92,74,42,0.25);
  background: var(--paper);
  cursor: pointer;
  font-size: 18px;
  font-weight: 700;
  line-height: 28px;
  text-align: center;
  color: var(--ink-light);
  transition: all 0.2s ease;
  font-family: 'Noto Serif SC', serif;
}
.zoom-btn:hover {
  background: var(--ink);
  color: var(--paper);
  border-color: var(--ink);
}
.zoom-label {
  font-size: 11px;
  font-weight: 700;
  color: var(--ink-light);
  letter-spacing: 1px;
  padding: 2px 0;
  min-width: 36px;
  text-align: center;
}
.zoom-reset {
  font-size: 10px;
  padding: 3px 10px;
  border-radius: 10px;
  border: 1px solid rgba(92,74,42,0.2);
  background: rgba(247,242,230,0.8);
  cursor: pointer;
  color: var(--ink-light);
  font-family: 'Noto Serif SC', serif;
  transition: all 0.2s ease;
  margin-top: 2px;
}
.zoom-reset:hover { background: var(--ink); color: var(--paper); }

/* 时间线 */
.timeline-line {
  position: absolute;
  left: 60px;
  right: 60px;
  top: 50%;
  height: 4px;
  background: linear-gradient(90deg,
    rgba(44,36,22,0.05) 0%,
    rgba(44,36,22,0.55) 3%,
    rgba(44,36,22,0.55) 97%,
    rgba(44,36,22,0.05) 100%
  );
  transform: translateY(-50%);
  box-shadow: 0 0 8px rgba(44,36,22,0.1);
  z-index: 2;
}

/* 章节标记 */
.chapter-marker {
  position: absolute;
  top: 50%;
  transform: translate(-50%, -50%);
  z-index: 10;
}

.chapter-marker .ch-dot {
  width: 18px; height: 18px;
  border-radius: 50%;
  background: var(--gold);
  border: 3px solid var(--ink);
  box-shadow: 0 0 0 4px var(--paper), 0 0 12px rgba(184,134,11,0.5);
  margin: 0 auto;
  position: relative;
  z-index: 2;
}

.chapter-marker .ch-label {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  white-space: nowrap;
  font-size: 15px;
  font-weight: 900;
  color: var(--wood-dark);
  letter-spacing: 2px;
  background: var(--paper);
  padding: 4px 10px;
  border: 1px solid rgba(92,58,30,0.2);
  border-radius: 3px;
  box-shadow: 2px 2px 6px rgba(0,0,0,0.08);
  z-index: 1;
}
.chapter-marker .ch-label.left { right: 28px; }
.chapter-marker .ch-label.right { left: 28px; }

/* 连接线 SVG */
.connector-svg {
  position: absolute;
  top: 0; left: 0;
  pointer-events: none;
  z-index: 3;
  overflow: visible;
}
.connector-svg line {
  stroke-dasharray: 4 3;
  transition: stroke-opacity 0.3s ease;
}
.connector-svg circle.endpoint-memory {
  fill: var(--vermilion);
  stroke: #fff;
  stroke-width: 2;
}
.connector-svg circle.endpoint-understand {
  fill: var(--indigo);
  stroke: #fff;
  stroke-width: 2;
}
.connector-svg circle.timeline-dot {
  transition: r 0.3s ease;
}

/* 事件节点 */
.event-node {
  position: absolute;
  cursor: pointer;
  z-index: 5;
  --card-scale: 1;
  opacity: 0;
}

.event-node.visible {
  animation: nodeAppear 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
}

@keyframes nodeAppear {
  from { opacity: 0; }
  to   { opacity: 1; }
}

.event-node:hover { z-index: 20; }
.event-node.above:hover .node-card {
  transform: translate(-50%, -100%) scale(calc(var(--card-scale) * 1.15));
}
.event-node.below:hover .node-card {
  transform: translate(-50%, 0%) scale(calc(var(--card-scale) * 1.15));
}

.event-node .node-card {
  display: inline-block;
  padding: 8px 14px;
  border-radius: 6px;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 1px;
  white-space: nowrap;
  transition: transform 0.3s ease, background 0.3s ease, color 0.3s ease, box-shadow 0.3s ease;
}

.event-node.memory .node-card {
  background: linear-gradient(135deg, #fff 0%, var(--vermilion-light) 100%);
  border: 2px solid var(--vermilion);
  color: var(--vermilion);
  box-shadow: 2px 3px 8px rgba(196,30,58,0.15);
}
.event-node.memory:hover .node-card {
  background: var(--vermilion);
  color: #fff;
  box-shadow: 0 4px 20px var(--vermilion-glow), 0 0 0 6px rgba(196,30,58,0.1);
}

.event-node.understand .node-card {
  background: linear-gradient(135deg, #fff 0%, var(--indigo-light) 100%);
  border: 2px solid var(--indigo);
  color: var(--indigo);
  box-shadow: 2px 3px 8px rgba(26,82,118,0.15);
}
.event-node.understand:hover .node-card {
  background: var(--indigo);
  color: #fff;
  box-shadow: 0 4px 20px var(--indigo-glow), 0 0 0 6px rgba(26,82,118,0.1);
}

.event-node .node-year {
  font-size: 10px;
  font-weight: 400;
  opacity: 0.7;
  letter-spacing: 0;
}

.event-node .badge {
  display: inline-block;
  font-size: 10px;
  padding: 1px 6px;
  border-radius: 3px;
  margin-left: 4px;
  font-weight: 400;
  letter-spacing: 0;
}
.event-node.memory .badge { background: rgba(196,30,58,0.15); }
.event-node.understand .badge { background: rgba(26,82,118,0.15); }

/* 详情弹窗遮罩 */
.overlay {
  position: fixed;
  inset: 0;
  z-index: 200;
  background: rgba(30,15,5,0.7);
  backdrop-filter: blur(8px);
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.35s ease;
}
.overlay.open {
  opacity: 1;
  pointer-events: auto;
}

.detail-card {
  background: var(--paper);
  background-image:
    radial-gradient(ellipse at 30% 20%, rgba(139,105,20,0.03) 0%, transparent 50%);
  max-width: 720px;
  width: 90vw;
  max-height: 80vh;
  border-radius: 12px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.4), 0 0 0 4px var(--wood), 0 0 0 8px rgba(92,61,46,0.3);
  overflow-y: auto;
  transform: scale(0.85);
  transition: transform 0.3s ease-out;
  position: relative;
}
.overlay.open .detail-card {
  transform: scale(1);
}

.detail-card::-webkit-scrollbar { width:6px; }
.detail-card::-webkit-scrollbar-track { background: transparent; }
.detail-card::-webkit-scrollbar-thumb { background: rgba(92,74,42,0.25); border-radius: 3px; }

.detail-header {
  padding: 28px 32px 16px;
  border-bottom: 2px solid rgba(92,74,42,0.15);
  position: sticky;
  top: 0;
  background: var(--paper);
  z-index: 2;
}

.detail-header .event-title {
  font-size: 24px;
  font-weight: 900;
  letter-spacing: 3px;
  margin-bottom: 8px;
}

.detail-header .event-meta {
  display: flex;
  gap: 12px;
  align-items: center;
  flex-wrap: wrap;
}

.detail-header .meta-tag {
  font-size: 12px;
  padding: 3px 10px;
  border-radius: 3px;
  font-weight: 600;
  letter-spacing: 1px;
}
.meta-tag.memory-tag {
  background: var(--vermilion-light);
  color: var(--vermilion);
  border: 1px solid var(--vermilion);
}
.meta-tag.understand-tag {
  background: var(--indigo-light);
  color: var(--indigo);
  border: 1px solid var(--indigo);
}
.meta-tag.chapter-tag {
  background: rgba(92,74,42,0.1);
  color: var(--ink-light);
  border: 1px solid rgba(92,74,42,0.2);
}

.detail-body {
  padding: 24px 32px 32px;
}

.detail-section {
  margin-bottom: 24px;
}

.detail-section h3 {
  font-size: 16px;
  font-weight: 900;
  letter-spacing: 2px;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.detail-section h3::before {
  content: '';
  display: inline-block;
  width: 4px;
  height: 18px;
  border-radius: 2px;
}
.detail-section.textbook h3::before { background: var(--gold); }
.detail-section.exam h3::before { background: var(--vermilion); }

.detail-section .textbook-quote {
  padding: 16px 20px;
  background: rgba(184,134,11,0.06);
  border-left: 3px solid var(--gold);
  font-size: 15px;
  line-height: 1.9;
  color: var(--ink);
  border-radius: 0 6px 6px 0;
  letter-spacing: 0.5px;
}

.detail-section .exam-item {
  padding: 10px 14px;
  margin-bottom: 8px;
  border-radius: 6px;
  background: rgba(196,30,58,0.04);
  border: 1px solid rgba(196,30,58,0.1);
  font-size: 14px;
  line-height: 1.7;
  display: flex;
  gap: 10px;
  align-items: baseline;
}

.exam-item .exam-paper {
  font-size: 11px;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 3px;
  background: var(--vermilion);
  color: #fff;
  white-space: nowrap;
  flex-shrink: 0;
}
.exam-item .exam-type {
  font-size: 11px;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 3px;
  background: rgba(196,30,58,0.12);
  color: var(--vermilion);
  white-space: nowrap;
  flex-shrink: 0;
}
.exam-item .exam-question {
  color: var(--ink);
  font-size: 14px;
}

.detail-close {
  position: sticky;
  top: 12px;
  float: right;
  width: 40px; height: 40px;
  border-radius: 50%;
  border: 2px solid rgba(92,74,42,0.3);
  background: var(--paper);
  cursor: pointer;
  font-size: 20px;
  line-height: 36px;
  text-align: center;
  color: var(--ink-light);
  transition: all 0.25s ease;
  z-index: 10;
}
.detail-close:hover {
  background: var(--ink);
  color: var(--paper);
  border-color: var(--ink);
  transform: rotate(90deg);
}

/* 提示文字 */
.hint-text {
  position: fixed;
  bottom: 90px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 50;
  font-size: 13px;
  color: var(--ink-light);
  letter-spacing: 2px;
  opacity: 0.7;
  pointer-events: none;
  transition: opacity 1s ease;
  background: rgba(247,242,230,0.8);
  padding: 6px 16px;
  border-radius: 20px;
  border: 1px solid rgba(92,74,42,0.15);
}

/* 图例 */
.legend {
  position: fixed;
  bottom: 36px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 50;
  display: flex;
  gap: 20px;
  background: rgba(247,242,230,0.9);
  padding: 6px 18px;
  border-radius: 20px;
  border: 1px solid rgba(92,74,42,0.15);
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  font-weight: 600;
  color: var(--ink-light);
  letter-spacing: 1px;
}
.legend-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
}
.legend-dot.legend-memory { background: var(--vermilion); }
.legend-dot.legend-understand { background: var(--indigo); }

/* 年份刻度 */
.year-tick {
  position: absolute;
  top: 50%;
  transform: translate(-50%, -50%);
  font-size: 10px;
  color: rgba(92,74,42,0.35);
  pointer-events: none;
}

/* 响应式 */
@media (max-width: 768px) {
  .top-nav { padding: 0 16px; gap: 8px; }
  .top-nav .title { font-size: 16px; letter-spacing: 2px; }
  .chapter-tab { padding: 4px 10px; font-size: 11px; }
  .filter-btn { padding: 5px 12px; font-size: 11px; }
  .detail-card { width: 95vw; max-height: 85vh; }
  .detail-header { padding: 20px 20px 12px; }
  .detail-header .event-title { font-size: 20px; }
  .detail-body { padding: 16px 20px 24px; }
}
</style>
</head>
<body>

<div class="scroll-stage">
  <div class="scroll-rod top"></div>
  <div class="paper-surface">
    <div class="top-nav">
      <span class="title">中国近现代史纲要 · 编年卷轴</span>
      <div class="chapter-tabs" id="chapterTabs"></div>
      <div class="filter-section">
        <button class="filter-btn active" data-filter="all" onclick="setFilter('all')">全部事件</button>
        <button class="filter-btn" data-filter="memory" onclick="setFilter('memory')">识记性重点</button>
        <button class="filter-btn" data-filter="understand" onclick="setFilter('understand')">理解性重点</button>
      </div>
    </div>

    <div class="timeline-viewport" id="viewport">
      <div class="timeline-track" id="track">
      </div>
    </div>
    </div>

    <div class="hint-text" id="hint">← 拖拽滚动浏览 · 点击事件查看详情 →</div>

    <div class="legend">
      <div class="legend-item"><div class="legend-dot legend-memory"></div> 识记性重点</div>
      <div class="legend-item"><div class="legend-dot legend-understand"></div> 理解性重点</div>
    </div>

    <div class="zoom-controls" id="zoomControls">
      <button class="zoom-btn" onclick="adjustZoom(0.015)" title="放大">+</button>
      <span class="zoom-label" id="zoomLabel">100%</span>
      <button class="zoom-btn" onclick="adjustZoom(-0.015)" title="缩小">−</button>
      <button class="zoom-reset" onclick="resetZoom()">复位</button>
    </div>
  </div>
  <div class="scroll-rod bottom"></div>
</div>

<div class="overlay" id="overlay" onclick="closeDetail(event)">
  <div class="detail-card" id="detailCard" onclick="event.stopPropagation()">
    <button class="detail-close" onclick="closeDetail()">✕</button>
    <div class="detail-header" id="detailHeader"></div>
    <div class="detail-body" id="detailBody"></div>
  </div>
</div>

<script>
// ==================== 事件数据 ====================
const EVENTS = [];

let _eventIdCounter = 0;
function addEvent(cfg) {
  if (!cfg.id) cfg.id = 'evt_' + (++_eventIdCounter);
  EVENTS.push(cfg);
}

// ============ 第一章 反对外国侵略的斗争 ============
const CH1 = 1;

// ==================== 渲染引擎 ====================

const YEAR_START = 1839;
const YEAR_END = 2023;
const PX_PER_YEAR = 28;
const trackEl = document.getElementById('track');
const viewport = document.getElementById('viewport');
const chapterTabs = document.getElementById('chapterTabs');
const overlay = document.getElementById('overlay');
const detailHeader = document.getElementById('detailHeader');
const detailBody = document.getElementById('detailBody');
const hint = document.getElementById('hint');
const zoomLabel = document.getElementById('zoomLabel');

let currentFilter = 'all';
let zoomLevel = 1.0;
let anchorBaseX = 0;
const ZOOM_MIN = 0.50;
const ZOOM_MAX = 5.0;
const ZOOM_SPEED_WHEEL = 0.008;
let baseTrackWidth = 0;

const positionedEls = [];
let svgEl = null;

const CHAPTER_NAMES = {
  1:'第一章 磨难与抗争',
  2:'第二章 早期探索',
  3:'第三章 辛亥革命',
  4:'第四章 开天辟地',
  5:'第五章 革命新道路',
  6:'第六章 抗日战争',
  7:'第七章 为新中国奋斗',
  8:'第八章 社会主义制度',
  9:'第九章 建设探索',
  10:'第十章 改革开放新时代'
};

function xPos(year) {
  return (year - YEAR_START) * PX_PER_YEAR + 120;
}

function displayX(baseX) {
  return (baseX - anchorBaseX) * zoomLevel + anchorBaseX;
}

function buildChapterTabs() {
  let html = '';
  for (let i=1; i<=10; i++) {
    html += `<div class="chapter-tab" data-chapter="${i}" onclick="scrollToChapter(${i})">第${i}章</div>`;
  }
  chapterTabs.innerHTML = html;
}

let globalShift = 0;

function updateAllPositions() {
  // 卡片缩放区间：<100% 仅圆点，100%-150% 平滑过渡，>150% 完整卡片
  const cardScale = zoomLevel < 1.0 ? 0.01
    : zoomLevel < 1.5 ? 0.01 + (zoomLevel - 1.0) / 0.5 * 0.99
    : 1;
  const cardOpacity = zoomLevel < 1.0 ? 0 : zoomLevel < 1.5 ? (zoomLevel - 1.0) / 0.5 : 1;

  const margin = 300;
  const rawDx = [];

  positionedEls.forEach(item => {
    const dx = displayX(item.baseX);
    rawDx.push(dx);
  });

  const minRaw = rawDx.length > 0 ? Math.min(...rawDx) : 0;
  globalShift = margin - minRaw;

  positionedEls.forEach((item, i) => {
    const finalX = rawDx[i] + globalShift;
    if (item.type === 'svgline') {
      item.el.setAttribute('x1', finalX);
      item.el.setAttribute('x2', finalX);
    } else if (item.type === 'svgcircle') {
      item.el.setAttribute('cx', finalX);
    } else if (item.type === 'tick') {
      item.el.style.left = finalX + 'px';
    } else if (item.type === 'node') {
      item.el.style.left = finalX + 'px';
      item.el.style.setProperty('--card-scale', cardScale);
      const cardEl = item.el.querySelector('.node-card');
      if (cardEl) cardEl.style.opacity = cardOpacity;
    } else {
      item.el.style.left = finalX + 'px';
    }
  });

  const maxRaw = rawDx.length > 0 ? Math.max(...rawDx) : 0;
  const trackW = maxRaw + globalShift + margin;
  trackEl.style.width = trackW + 'px';
  if (svgEl) svgEl.style.width = trackW + 'px';

  updateTickVisibility();
}

function getTickInterval() {
  if (zoomLevel < 0.6) return 20;
  if (zoomLevel < 1.2) return 10;
  if (zoomLevel < 2.5) return 5;
  return 1;
}

function updateTickVisibility() {
  const interval = getTickInterval();
  positionedEls.forEach(item => {
    if (item.type !== 'tick') return;
    const year = parseInt(item.el.dataset.tickYear);
    const show = (year % interval === 0);
    item.el.style.display = show ? '' : 'none';
    const isLabel = (interval >= 5 && year % (interval * (interval >= 10 ? 1 : 2)) === 0) || interval <= 1;
    if (show) {
      item.el.classList.toggle('major', isLabel);
      item.el.classList.toggle('minor', !isLabel);
    }
  });
}

function applyZoom(level, keepCenterEvt) {
  const oldZoom = zoomLevel;
  zoomLevel = Math.min(ZOOM_MAX, Math.max(ZOOM_MIN, level));
  zoomLevel = Math.round(zoomLevel * 100) / 100;
  if (zoomLevel === oldZoom) return;

  const vw = viewport.clientWidth;
  const mouseX = keepCenterEvt
    ? keepCenterEvt.clientX - viewport.getBoundingClientRect().left
    : vw / 2;
  const focalDisplay = viewport.scrollLeft + mouseX;

  // focalDisplay→ 旧坐标系 baseX → 新 zoom 下的 raw display（anchor 不变）
  const focalBase = (focalDisplay - globalShift - anchorBaseX) / oldZoom + anchorBaseX;
  const newRawDisplay = (focalBase - anchorBaseX) * zoomLevel + anchorBaseX;

  updateAllPositions();
  zoomLabel.textContent = Math.round(zoomLevel * 100) + '%';

  // 保持焦点在鼠标位置
  viewport.scrollLeft = newRawDisplay + globalShift - mouseX;
}

function adjustZoom(delta) {
  applyZoom(zoomLevel + delta);
}

function resetZoom() {
  applyZoom(1.0);
}

viewport.addEventListener('wheel', (e) => {
  if (e.ctrlKey || e.metaKey) return;
  if (Math.abs(e.deltaX) > Math.abs(e.deltaY)) return;
  e.preventDefault();
  const delta = -e.deltaY * ZOOM_SPEED_WHEEL * 0.01;
  applyZoom(zoomLevel + delta, e);
}, { passive: false });

function getChapterStartYear(chapter) {
  for (const e of EVENTS) {
    if (e.chapter === chapter && e.category !== 'chapter') return e.year;
  }
  return YEAR_START;
}

function scrollToChapter(ch) {
  const year = getChapterStartYear(ch);
  const baseX = xPos(year);
  const pos = displayX(baseX) + globalShift;
  document.querySelectorAll('.chapter-tab').forEach(t => t.classList.remove('active'));
  const tab = document.querySelector(`.chapter-tab[data-chapter="${ch}"]`);
  if (tab) tab.classList.add('active');
  viewport.scrollTo({ left: pos - 200, behavior: 'smooth' });
}

function setFilter(filter) {
  currentFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`.filter-btn[data-filter="${filter}"]`).classList.add('active');
  applyFilter();
}

function applyFilter() {
  const nodes = document.querySelectorAll('.event-node');
  nodes.forEach(node => {
    const cat = node.dataset.category;
    const match = currentFilter === 'all' || cat === currentFilter;
    if (match) {
      node.style.display = '';
      if (!node.classList.contains('visible')) node.classList.add('visible');
    } else {
      node.style.display = 'none';
    }
  });
}

function renderTimeline() {
  positionedEls.length = 0;
  const nonChapterEvts = EVENTS.filter(e => e.category !== 'chapter');

  // 阶梯布局：按时间排序，14 级周期分布（上 8 级 + 下 6 级）
  const sorted = [...nonChapterEvts].sort((a, b) => a.year - b.year || a.title.localeCompare(b.title));
  const LEVELS_ABOVE = 8, LEVELS_BELOW = 6, TOTAL = LEVELS_ABOVE + LEVELS_BELOW;
  const STEP = 5.3;

  sorted.forEach((e, idx) => {
    const r = idx % TOTAL;
    let side, level;
    if (r < LEVELS_ABOVE * 2 && r % 2 === 0) {
      side = 'above'; level = Math.floor(r / 2) + 1;
    } else if (r < LEVELS_ABOVE * 2 && r % 2 === 1) {
      side = 'below'; level = Math.floor(r / 2) + 1;
    } else {
      side = 'above'; level = r - LEVELS_BELOW + 1;
    }
    const yPct = side === 'above' ? 50 - level * STEP : 50 + level * STEP;
    e._side = side;
    e._yPct = Math.max(2, Math.min(98, yPct));
    e._baseX = xPos(e.year);
  });

  baseTrackWidth = xPos(YEAR_END) + 300;
  anchorBaseX = baseTrackWidth / 2;
  zoomLevel = 1.0;

  // SVG 连接线
  let svgLines = '';
  nonChapterEvts.forEach(e => {
    const bx = e._baseX;
    const yPct = e._yPct;
    const cat = e.category === 'memory' ? 'memory' : 'understand';
    const color = e.category === 'memory' ? '#c41e3a' : '#1a5276';
    svgLines += `
      <circle data-bx="${bx}" data-cy="${yPct}" data-role="endpoint" cx="${bx}" cy="${yPct}%" r="5"
        fill="${color}" stroke="#fff" stroke-width="2" class="endpoint-${cat}"/>
      <line data-bx="${bx}" data-ypct="${yPct}" x1="${bx}" y1="${yPct}%" x2="${bx}" y2="50%"
        stroke="${color}" stroke-width="1.2" stroke-opacity="0.28" vector-effect="non-scaling-stroke"/>
      <circle data-bx="${bx}" data-role="tl-dot" cx="${bx}" cy="50%" r="3"
        fill="${color}" fill-opacity="0.5" class="timeline-dot"/>`;
  });

  // 章节标记
  let chapterHtml = '';
  for (let ch = 1; ch <= 10; ch++) {
    const chEvents = EVENTS.filter(e => e.chapter === ch && e.category !== 'chapter');
    if (chEvents.length === 0) continue;
    const startYear = Math.min(...chEvents.map(e => e.year));
    const chx = xPos(startYear);
    const side = ch % 2 === 0 ? 'right' : 'left';
    chapterHtml += `<div class="chapter-marker" data-bx="${chx}" data-chapter="${ch}" style="left:${chx}px">
      <div class="ch-label ${side}">${CHAPTER_NAMES[ch]}</div>
      <div class="ch-dot"></div>
    </div>`;
  }

  // 年份刻度
  let ticksHtml = '';
  for (let y = Math.floor(YEAR_START/5)*5; y <= YEAR_END; y += 5) {
    const bx = xPos(y);
    ticksHtml += `<div class="tick-mark major" data-tick-year="${y}" data-bx="${bx}" style="left:${bx}px">
      <div class="tick-line"></div><div class="tick-label">${y}</div></div>`;
  }
  for (let y = YEAR_START; y <= YEAR_END; y++) {
    if (y % 5 === 0) continue;
    const bx = xPos(y);
    ticksHtml += `<div class="tick-mark minor" data-tick-year="${y}" data-bx="${bx}" style="left:${bx}px; display:none;">
      <div class="tick-line"></div></div>`;
  }

  // 事件节点
  let eventsHtml = '';
  nonChapterEvts.forEach(e => {
    const catClass = e.category === 'memory' ? 'memory' : 'understand';
    const badge = e.category === 'memory' ? '识记' : '理解';
    const tform = e._side === 'above' ? 'translate(-50%,-100%)' : 'translate(-50%,0%)';
    eventsHtml += `<div class="event-node ${catClass} ${e._side}"
      data-category="${e.category}" data-id="${e.id}" data-bx="${e._baseX}"
      style="left:${e._baseX}px; top:${e._yPct}%; --card-scale:1;"
      onclick="openDetail('${e.id}')">
      <div class="node-card" style="transform:${tform} scale(var(--card-scale));">${e.title}<span class="badge">${badge}</span><span class="node-year">${e.year}</span></div>
    </div>`;
  });

  trackEl.innerHTML = `
    <svg class="connector-svg" style="width:${baseTrackWidth}px; height:100%;">${svgLines}</svg>
    <div class="timeline-line"></div>
    ${chapterHtml}
    ${ticksHtml}
    ${eventsHtml}`;

  svgEl = trackEl.querySelector('.connector-svg');
  trackEl.querySelectorAll('line[data-bx]').forEach(line => {
    positionedEls.push({ el: line, baseX: parseFloat(line.dataset.bx), type: 'svgline' });
  });
  trackEl.querySelectorAll('circle[data-bx]').forEach(c => {
    positionedEls.push({ el: c, baseX: parseFloat(c.dataset.bx), type: 'svgcircle' });
  });
  trackEl.querySelectorAll('.chapter-marker[data-bx]').forEach(el => {
    positionedEls.push({ el, baseX: parseFloat(el.dataset.bx), type: 'chapter' });
  });
  trackEl.querySelectorAll('.tick-mark[data-bx]').forEach(el => {
    positionedEls.push({ el, baseX: parseFloat(el.dataset.bx), type: 'tick' });
  });
  trackEl.querySelectorAll('.event-node[data-bx]').forEach(el => {
    positionedEls.push({ el, baseX: parseFloat(el.dataset.bx), type: 'node' });
  });

  updateTickVisibility();
  zoomLabel.textContent = '100%';

  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) entry.target.classList.add('visible');
    });
  }, { root: viewport, threshold: 0.05, rootMargin: '0px 80px 0px 80px' });

  trackEl.querySelectorAll('.event-node').forEach(node => observer.observe(node));

  setTimeout(() => {
    trackEl.querySelectorAll('.event-node').forEach(node => {
      const rect = node.getBoundingClientRect();
      const vw = viewport.getBoundingClientRect();
      if (rect.left < vw.right && rect.right > vw.left) node.classList.add('visible');
    });
  }, 200);
}

// 详情弹窗
function openDetail(id) {
  let event = EVENTS.find(e => e.id === id);
  if (!event) event = EVENTS.find(e => e.title === id);
  if (!event) return;

  const catTag = event.category === 'memory'
    ? '<span class="meta-tag memory-tag">识记性重点</span>'
    : '<span class="meta-tag understand-tag">理解性重点</span>';

  detailHeader.innerHTML = `
    <div class="event-title" style="color:${event.category==='memory'?'var(--vermilion)':'var(--indigo)'}">${event.title}</div>
    <div class="event-meta">
      ${catTag}
      <span class="meta-tag chapter-tag">${event.year}年 · ${CHAPTER_NAMES[event.chapter]||'第'+event.chapter+'章'}</span>
    </div>`;

  let bodyHtml = '';

  if (event.textbook) {
    bodyHtml += `<div class="detail-section textbook">
      <h3>教材原文</h3>
      <div class="textbook-quote">${event.textbook}</div>
    </div>`;
  }

  if (event.examRefs && event.examRefs.length > 0) {
    bodyHtml += `<div class="detail-section exam">
      <h3>考题回溯（共${event.examRefs.length}题）</h3>`;
    event.examRefs.forEach(ref => {
      bodyHtml += `<div class="exam-item">
        <span class="exam-paper">${ref.paper}</span>
        <span class="exam-type">${ref.type}</span>
        <span class="exam-question">${ref.q}</span>
      </div>`;
    });
    bodyHtml += `</div>`;
  }

  detailBody.innerHTML = bodyHtml;
  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeDetail(e) {
  if (e && e.target !== overlay) return;
  overlay.classList.remove('open');
  document.body.style.overflow = '';
}

// 键盘关闭
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    overlay.classList.remove('open');
    document.body.style.overflow = '';
  }
});

// 滚动时更新章节标签和隐藏提示
viewport.addEventListener('scroll', () => {
  const sl = viewport.scrollLeft;
  hint.style.opacity = sl > 100 ? '0' : '0.7';

  const vw = viewport.clientWidth;
  const centerRaw = sl + vw / 2 - globalShift;
  const centerBase = (zoomLevel !== 0) ? (centerRaw - anchorBaseX) / zoomLevel + anchorBaseX : centerRaw;

  let activeChapter = 1;
  for (let ch=1; ch<=10; ch++) {
    const sy = getChapterStartYear(ch);
    if (centerBase + 200 >= xPos(sy)) activeChapter = ch;
  }
  document.querySelectorAll('.chapter-tab').forEach(t => {
    const tabCh = parseInt(t.dataset.chapter);
    t.classList.toggle('active', tabCh === activeChapter);
  });
});

// 拖拽滚动
let isDown = false, startX, scrollLeftStart;
viewport.addEventListener('mousedown', (e) => {
  isDown = true;
  startX = e.pageX - viewport.offsetLeft;
  scrollLeftStart = viewport.scrollLeft;
  viewport.style.cursor = 'grabbing';
});
viewport.addEventListener('mouseleave', () => { isDown = false; viewport.style.cursor = 'grab'; });
viewport.addEventListener('mouseup', () => { isDown = false; viewport.style.cursor = 'grab'; });
viewport.addEventListener('mousemove', (e) => {
  if (!isDown) return;
  e.preventDefault();
  const x = e.pageX - viewport.offsetLeft;
  const walk = (x - startX) * 2;
  viewport.scrollLeft = scrollLeftStart - walk;
});

// 初始化
buildChapterTabs();
renderTimeline();

// 初始滚动到第一个事件
setTimeout(() => {
  const firstYear = getChapterStartYear(1);
  viewport.scrollTo({ left: displayX(xPos(firstYear)) + globalShift - 100 });
}, 300);

</script>
</body>
